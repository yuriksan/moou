<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#1a1a1a"/>
  <!-- Ears/horns -->
  <ellipse cx="7" cy="8" rx="3.5" ry="2.5" fill="#c07a1a" transform="rotate(-20 7 8)"/>
  <ellipse cx="25" cy="8" rx="3.5" ry="2.5" fill="#c07a1a" transform="rotate(20 25 8)"/>
  <!-- Head -->
  <ellipse cx="16" cy="17" rx="10" ry="9" fill="#f0efe9"/>
  <!-- Spots -->
  <ellipse cx="11" cy="14" rx="3" ry="2.5" fill="#1a1a1a" opacity="0.2"/>
  <ellipse cx="20" cy="12" rx="2.5" ry="2" fill="#1a1a1a" opacity="0.2"/>
  <!-- Eyes -->
  <circle cx="12" cy="16" r="1.5" fill="#1a1a1a"/>
  <circle cx="20" cy="16" r="1.5" fill="#1a1a1a"/>
  <!-- Snout -->
  <ellipse cx="16" cy="21.5" rx="5" ry="3.5" fill="#c07a1a" opacity="0.3"/>
  <!-- Nostrils -->
  <ellipse cx="14" cy="22" rx="1" ry="0.7" fill="#1a1a1a" opacity="0.4"/>
  <ellipse cx="18" cy="22" rx="1" ry="0.7" fill="#1a1a1a" opacity="0.4"/>
</svg>
